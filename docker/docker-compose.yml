services:
  agent:
    image: multi-agent-project:latest
    ports:
      - "8000:8000"           # FastAPI
      - "8001:8001"           # Hermes Gateway
      - "8501:8501"           # Streamlit
    env_file:
      - ./.env.prod
    # environment:
    #   - NEO4J_URI=${NEO4J_URI}
    #   - NEO4J_USER=${NEO4J_USER}
    #   - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    #   - CHROMA_PATH=${CHROMA_PATH}
    #   - MEMORY_DB=${MEMORY_DB}
    #   - LOG_LEVEL=INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data_volume/agent:/data
    depends_on:
      - neo4j
      - chroma
    restart: unless-stopped
    networks:
      - agent-network

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - ./data_volume/neo4j/data:/data
      - ./data_volume/neo4j/logs:/logs
    restart: unless-stopped
    networks:
      - agent-network
    
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - ./data_volume/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped
    networks:
      - agent-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./data_volume/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data_volume/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
